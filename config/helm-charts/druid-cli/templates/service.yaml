apiVersion: v1
kind: Service
metadata:
  name: {{ include "druid-cli.fullname" . }}
  labels:
    {{- include "druid-cli.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.managementPort }}
      targetPort: management
      protocol: TCP
      name: management
    - port: {{ .Values.service.publicPort }}
      targetPort: public
      protocol: TCP
      name: public
  selector:
    {{- include "druid-cli.selectorLabels" . | nindent 4 }}

{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "druid-cli.fullname" . }}
  labels:
    {{- include "druid-cli.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "druid-cli.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingress.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.ingress.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.managementPort }}
        - protocol: TCP
          port: {{ .Values.service.publicPort }}
{{- end }}

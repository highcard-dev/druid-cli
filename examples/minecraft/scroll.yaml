name: ghcr.io/druid-examples/minecraft
desc: Minecraft server using commands as runtime units
version: 0.1.0
app_version: 1.20.4

ports:
  - name: minecraft
    protocol: tcp
    port: 25565
    sleep_handler: generic
    mandatory: true

serve: "start"
commands:
  install:
    run: once
    procedures:
      - image: eclipse-temurin:21-jre
        mounts:
          - path: /server
        working_dir: /server
        command:
          - sh
          - -c
          - >-
            curl -fsSL -o server.jar
            https://piston-data.mojang.com/v1/objects/8dd1a28015f51b1803213892b50b7b4fc76e594d/server.jar
            && echo eula=true > eula.txt

  start:
    needs: [install]
    run: restart
    procedures:
      - id: coldstart
        image: druid-coldstarter:local
        expectedPorts:
          - name: minecraft
            keepAliveTraffic: 10kb/5m
        mounts:
          - path: /runtime
        command:
          - druid-coldstarter
          - --runtime-config
          - /runtime/.druid/runtime.json
          - --status-file
          - .coldstarter-finished.json

      - id: start
        image: eclipse-temurin:21-jre
        expectedPorts:
          - name: minecraft
            keepAliveTraffic: 10kb/5m
        mounts:
          - path: /server
        working_dir: /server
        command:
          - java
          - -Xmx1024M
          - -Xms1024M
          - -jar
          - server.jar
          - nogui

  stop:
    run: always
    procedures:
      - type: signal
        target: start
        signal: SIGTERM
